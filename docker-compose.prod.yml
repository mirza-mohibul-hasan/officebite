services:
  postgres:
    image: postgres:16-alpine
    container_name: officebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-officebite}
      POSTGRES_USER: ${POSTGRES_USER:-officebite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-officebite} -d ${POSTGRES_DB:-officebite}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: officebite-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-officebite}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-officebite}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:-officebite-api}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      AUTO_MIGRATE: "false"
      DATABASE_LOG_LEVEL: error
      SEED_DATA: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    container_name: officebite-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres-data:
