services:
  postgres:
    image: postgres:16-alpine
    container_name: officebite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-officebite}
      POSTGRES_USER: ${POSTGRES_USER:-officebite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-officebite}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-officebite} -d ${POSTGRES_DB:-officebite}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: officebite-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-officebite}:${POSTGRES_PASSWORD:-officebite}@postgres:5432/${POSTGRES_DB:-officebite}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      DATABASE_LOG_LEVEL: ${DATABASE_LOG_LEVEL:-warn}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      target: dev
    container_name: officebite-web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres-data:
